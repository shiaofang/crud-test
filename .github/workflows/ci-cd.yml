name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          OWNER="$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-backend" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-nginx" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.nginx_image }}:latest
            ${{ steps.meta.outputs.nginx_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Extract image metadata
        id: meta
        run: |
          OWNER="$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-backend" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-nginx" >> "$GITHUB_OUTPUT"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          source: docker-compose.prod.yml
          target: /opt/crud-app/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          NGINX_IMAGE: ${{ steps.meta.outputs.nginx_image }}:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          envs: BACKEND_IMAGE,NGINX_IMAGE
          script: |
            set -euo pipefail
            mkdir -p /opt/crud-app
            cd /opt/crud-app
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cat > .env.deploy <<EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            NGINX_IMAGE=${NGINX_IMAGE}
            EOF
            docker compose --env-file .env.deploy -f docker-compose.prod.yml pull
            docker compose --env-file .env.deploy -f docker-compose.prod.yml up -d
            docker image prune -f
