name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          OWNER="$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-backend" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-nginx" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.nginx_image }}:latest
            ${{ steps.meta.outputs.nginx_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy target
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "DEPLOY_HOST=$(echo -n "$SERVER_HOST" | tr -d '[:space:]')" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=$(echo -n "$SERVER_USER" | tr -d '[:space:]')" >> "$GITHUB_ENV"
          echo "Deploy target: $(echo -n "$SERVER_USER" | tr -d '[:space:]')@$(echo -n "$SERVER_HOST" | tr -d '[:space:]')"

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY'; then
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          echo "Public key loaded from secret (must match server authorized_keys):"
          ssh-keygen -y -f ~/.ssh/deploy_key
          ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Extract image metadata
        id: meta
        run: |
          OWNER="$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-backend" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-nginx" >> "$GITHUB_OUTPUT"

      - name: Copy compose file to server
        run: |
          SSH_OPTS="-o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/deploy_key"
          ssh $SSH_OPTS "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" "mkdir -p /opt/crud-app"
          scp $SSH_OPTS docker-compose.prod.yml \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/opt/crud-app/"

      - name: Deploy on server
        env:
          BACKEND_IMAGE: ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          NGINX_IMAGE: ${{ steps.meta.outputs.nginx_image }}:${{ github.sha }}
        run: |
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/deploy_key \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" << EOF
          set -euo pipefail
          mkdir -p /opt/crud-app
          cd /opt/crud-app
          echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cat > .env.deploy << INNEREOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          BACKEND_IMAGE=${BACKEND_IMAGE}
          NGINX_IMAGE=${NGINX_IMAGE}
          INNEREOF
          docker compose --env-file .env.deploy -f docker-compose.prod.yml pull
          docker compose --env-file .env.deploy -f docker-compose.prod.yml up -d
          docker image prune -f
          EOF
