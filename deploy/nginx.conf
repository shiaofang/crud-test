# /etc/nginx/sites-available/crud-app
# 启用: sudo ln -s /etc/nginx/sites-available/crud-app /etc/nginx/sites-enabled/
server {
    listen 80;
    server_name _;  # 换成你的域名或服务器公网 IP

    # 前端静态文件（vite build 产物）
    root /var/www/crud-app/frontend/dist;
    index index.html;

    # 前端路由：找不到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理到 uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
